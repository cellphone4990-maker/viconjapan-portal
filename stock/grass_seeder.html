<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グラスシーダー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background: #fff; color: #222; font-size: 13px; }
  .page { max-width: 800px; margin: 0 auto; padding: 20px 16px; }
  .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #222; }
  .category-title { font-size: 15px; font-weight: bold; letter-spacing: 0.05em; }
  .update-date { font-size: 11px; color: #666; }
  table { width: 100%; border-collapse: collapse; }
  tbody tr { border-bottom: 1px solid #e0e0e0; }
  tbody tr:nth-child(even) { background: #f8f8f8; }
  tbody td { padding: 8px 10px; vertical-align: middle; }
  .mark { text-align: center; font-size: 15px; width: 60px; }
  .mark-green { color: #2a7a2a; font-weight: bold; }
  .mark-cross { color: #aaa; }
  @media (max-width: 480px) { .page { padding: 12px 10px; } tbody td { padding: 6px 8px; font-size: 12px; } }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="category-title">グラスシーダー</div>
    <div class="update-date">2026.06.08 更新</div>
  </div>
  <table><tbody>
      <tr><td class="mark mark-green">●</td><td>SV 110</td></tr>
      <tr><td class="mark mark-cross">✕</td><td>SV 170</td></tr>
      <tr><td class="mark mark-cross">✕</td><td>V 120-8</td></tr>
      <tr><td class="mark mark-green">●</td><td>V 230-8</td></tr>
      <tr><td class="mark mark-cross">✕</td><td>V 500-8</td></tr>
      <tr><td class="mark mark-cross">✕</td><td>V 500-16</td></tr>
  </tbody></table>
</div>
</body>
</html>
