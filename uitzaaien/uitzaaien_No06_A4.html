<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>uitzaaien No.06</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #e8e8e8;
  display: flex;
  justify-content: center;
  padding: 24px;
  font-family: 'Montserrat', sans-serif;
}

.page {
  width: 210mm;
  min-height: 297mm;
  background: #ffffff;
  padding: 10mm 10mm 8mm;
  display: flex;
  flex-direction: column;
  gap: 3mm;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 3mm;
  border-bottom: 1.5px solid #1a1a1e;
}

.brand-label {
  font-size: 6pt;
  letter-spacing: 0.25em;
  color: #aaa;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.title-main {
  font-size: 20pt;
  font-weight: 100;
  letter-spacing: 0.42em;
  color: #1a1a1e;
  line-height: 1;
}

.header-right { text-align: right; }

.issue-no {
  font-size: 28pt;
  font-weight: 100;
  color: #e8e8e8;
  line-height: 1;
  letter-spacing: -0.02em;
}

.issue-date {
  font-size: 7pt;
  font-weight: 200;
  letter-spacing: 0.15em;
  color: #bbb;
  text-transform: uppercase;
}

.main-card img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 4px;
}

.sub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3mm;
}

.sub-grid img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 3px;
}

.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 3mm;
  margin-top: 1mm;
}

.cat-btn {
  display: flex;
  overflow: hidden;
  flex-direction: column;
  align-items: center;
  gap: 2mm;
  text-decoration: none;
  cursor: pointer;
}

.cat-btn img {
  border-radius: 16px;
  width: 70%;
  height: auto;
  display: block;
  
  filter: saturate(0.5);
  transition: opacity 0.2s;
}

.cat-btn:hover img { filter: saturate(0.75); }

.cat-label {
  font-size: 8pt;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: #555;
  text-transform: uppercase;
}

.footer {
  margin-top: auto;
  padding-top: 3mm;
  border-top: 0.5px solid #ddd;
}

.footer-note {
  font-size: 7pt;
  font-weight: 200;
  color: #bbb;
  letter-spacing: 0.08em;
}

@media print {
  body { background: #fff; padding: 0; }
  .page { margin: 0; box-shadow: none; min-height: 100vh; }
}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VS2M1SZ32Y"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-VS2M1SZ32Y");</script></head>
<body>
<div class="page">

  <div class="header">
    <div>
      <div class="brand-label">Vicon Japan</div>
      <div class="title-main">U I T Z A A I E N</div>
    </div>
    <div class="header-right">
      <div class="issue-no">06</div>
      <div class="issue-date">June 2026</div>
    </div>
  </div>

  <div class="main-card">
    <img src="./images/Card Ferri ZMTE1800PH.jpg" alt="Ferri ZMTE1800PH">
  </div>

  <div class="sub-grid">
    <img src="./images/Card Ferri T380EXP-SC.jpg"  alt="Ferri T380EXP-SC">
    <img src="./images/Card Ferri ZMGE1600H.jpg"  alt="Ferri ZMGE1600H">
    <img src="./images/Card Maschio PM370P.jpg" alt="Maschio PM370P">
    <img src="./images/Card Vicon EX732T.jpg" alt="Vicon EX732T">
  </div>

  <div class="btn-grid">
    <a class="cat-btn" href="uitzaaien_chikusan.html">
      <img src="./images/Icon 畜産.jpg" alt="畜産">
      <span class="cat-label">畜産</span>
    </a>
    <a class="cat-btn" href="uitzaaien_sanpu.html">
      <img src="./images/Icon 種子.jpg" alt="散布・播種">
      <span class="cat-label">散布・播種</span>
    </a>
    <a class="cat-btn" href="uitzaaien_toko.html">
      <img src="./images/Icon 土.jpg" alt="土耕機">
      <span class="cat-label">土耕機</span>
    </a>
  </div>

  <div class="footer">
    <div class="footer-note">詳細は営業担当者へご連絡ください。</div>
  </div>

</div>
</body>
</html>
