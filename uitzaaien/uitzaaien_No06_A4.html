* { margin:0; padding:0; box-sizing:border-box; }

.page {
  width: 210mm;
  min-height: 297mm;
  background: #ffffff;
  padding: 10mm 10mm 8mm;
  display: flex;
  flex-direction: column;
  gap: 3mm;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 3mm;
  border-bottom: 1.5px solid #1a1a1e;
}

.brand-label {
  font-size: 6pt;
  letter-spacing: 0.25em;
  color: #aaa;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.title-main {
  font-size: 20pt;
  font-weight: 100;
  letter-spacing: 0.42em;
  color: #1a1a1e;
  line-height: 1;
}

.header-right { text-align: right; }

.issue-no {
  font-size: 28pt;
  font-weight: 100;
  color: #e8e8e8;
  line-height: 1;
  letter-spacing: -0.02em;
}

.issue-date {
  font-size: 7pt;
  font-weight: 200;
  letter-spacing: 0.15em;
  color: #bbb;
  text-transform: uppercase;
}

.main-card img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 4px;
}

.sub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3mm;
}

.sub-grid img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 3px;
}

.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 3mm;
  margin-top: 1mm;
}

.cat-btn {
  display: flex;
  overflow: hidden;
  flex-direction: column;
  align-items: center;
  gap: 2mm;
  text-decoration: none;
  cursor: pointer;
}

.cat-btn img {
  border-radius: 16px;
  width: 70%;
  height: auto;
  display: block;
  
  filter: saturate(0.5);
  transition: opacity 0.2s;
}

.cat-btn:hover img { filter: saturate(0.75); }

.cat-label {
  font-size: 8pt;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: #555;
  text-transform: uppercase;
}

.footer {
  margin-top: auto;
  padding-top: 3mm;
  border-top: 0.5px solid #ddd;
}

.footer-note {
  font-size: 7pt;
  font-weight: 200;
  color: #bbb;
  letter-spacing: 0.08em;
}

@media print {
  body { background: #fff; padding: 0; }
  .page { margin: 0; box-shadow: none; min-height: 100vh; }
}

.footer-phone {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  text-decoration: none;
  margin-left: auto;
}
.footer-phone-text {
  font-family: 'Montserrat', sans-serif;
  font-size: 26pt;
  font-weight: 300;
  color: #1a1a1e;
  letter-spacing: 0.02em;
  height: 14mm;
  width: 48mm;
  white-space: nowrap;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  transform: scaleY(1.5);
  transform-origin: center;
}
.footer-phone-qr {
  width: 14mm;
  height: 14mm;
  display: block;
}
