* { margin:0; padding:0; box-sizing:border-box; }

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding-bottom: 3mm;
  border-bottom: 1.5px solid #1a1a1e;
}

.brand-label {
  font-size: 6pt;
  letter-spacing: 0.25em;
  color: #aaa;

.title-main {

}

.header-right { text-align: right; }

.issue-no {
  font-size: 28pt;
  font-weight: 100;
  color: #e8e8e8;
  line-height: 1;
  letter-spacing: -0.02em;
}

.issue-date {
  font-size: 7pt;
  font-weight: 200;
  letter-spacing: 0.15em;
  color: #bbb;
  text-transform: uppercase;
}

.cat-label {
  font-size: 9pt;
  font-weight: 200;
  letter-spacing: 0.3em;
  color: #888;
  text-transform: uppercase;
  padding-bottom: 2mm;
  border-bottom: 0.5px solid #eee;
}

/* ← flex:1 を外して上詰めに */
.card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3mm;
}

.card-item img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 3px;
}

.card-item.empty { background: transparent; }

/* フッターをflexの最後に自然に置く */
.spacer { flex: 1; }

.back-btn {
  display: inline-block;
  font-size: 7pt;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: #aaa;
  text-decoration: none;
  border: 0.5px solid #ddd;
  padding: 4px 12px;
  border-radius: 3px;
  text-transform: uppercase;
  align-self: flex-start;
}

.back-btn:hover { color: #666; border-color: #bbb; }

.footer {
  padding-top: 3mm;
  border-top: 0.5px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-note {
  font-size: 7pt;
  font-weight: 200;
  color: #bbb;
  letter-spacing: 0.08em;
}

@media print {
  body { background: #fff; padding: 0; }
  .page { margin: 0; box-shadow: none; min-height: 100vh; }
  .back-btn { display: none; }
}

.footer-phone {

  transform-origin: center;
}
.footer-phone-qr {
  width: 14mm;
  height: 14mm;
  display: block;
}
